<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Social preview card</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { width: 1280px; height: 640px; overflow: hidden; font-family: system-ui, "Segoe UI", Roboto, sans-serif; }
  .card {
    width: 1280px; height: 640px;
    background: radial-gradient(ellipse 900px 700px at 75% 20%, #1c2140 0%, #0f1115 55%);
    color: #eef0f4;
    display: flex; align-items: center;
    padding: 0 90px;
    position: relative;
  }
  .left { max-width: 640px; }
  .mark { width: 96px; height: 96px; margin-bottom: 36px; filter: drop-shadow(0 0 28px rgba(79, 94, 255, 0.55)); }
  h1 { font-size: 72px; letter-spacing: -0.02em; margin-bottom: 18px; }
  .tagline { font-size: 30px; line-height: 1.35; color: #b9bfd0; margin-bottom: 36px; }
  .tagline strong { color: #eef0f4; }
  .chips { display: flex; flex-wrap: wrap; gap: 12px; }
  .chip {
    border: 1.5px solid #3a4266; border-radius: 999px;
    padding: 9px 20px; font-size: 20px; color: #c9cfe2; background: rgba(79,94,255,0.08);
  }
  .chip--verified { border-color: #6f7bff; color: #aab3ff; font-weight: 600; }
  .shot {
    position: absolute; right: -20px; top: 70px;
    width: 430px; border-radius: 24px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px #2a2f3a;
    transform: rotate(3deg);
  }
  .url { position: absolute; left: 90px; bottom: 40px; font-size: 20px; color: #7d8394; }
</style>
</head>
<body>
  <div class="card">
    <div class="left">
      <svg class="mark" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="4" width="18" height="13" rx="4" fill="#4F5EFF"/>
        <path d="M7 17 L7 21 L11 17 Z" fill="#4F5EFF"/>
        <rect x="6.5" y="10" width="2.2" height="4.5" rx="1.1" fill="#ffffff"/>
        <rect x="10.5" y="8" width="2.2" height="6.5" rx="1.1" fill="#ffffff"/>
        <rect x="14.5" y="6" width="2.2" height="8.5" rx="1.1" fill="#ffffff"/>
      </svg>
      <h1>Signal Sifter</h1>
      <p class="tagline">The resume you can <strong>interrogate</strong> — an AI grounded in your real career story, with a hidden interview-practice coach.</p>
      <div class="chips">
        <span class="chip chip--verified">✓ Source-cited answers</span>
        <span class="chip">🎯 Practice interviews</span>
        <span class="chip">💸 Zero-cost stack</span>
      </div>
    </div>
    <img class="shot" src="screenshots/en/08-practice-coaching.png" alt="" />
    <div class="url">github.com/EnigmaDevelop/resume-signal-sifter</div>
  </div>
</body>
</html>
