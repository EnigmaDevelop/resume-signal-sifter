name = "signal-sifter-worker"
main = "src/index.js"
compatibility_date = "2024-11-01"

[vars]
# Set to your deployed site's origin (e.g. "https://username.github.io") once
# you know it. "*" is fine for local testing but allows any site to call your
# Worker in production.
ALLOWED_ORIGIN = "https://enigmadevelop.github.io"
RATE_LIMIT_PER_MINUTE = "10"

# --- LLM provider -----------------------------------------------------------
# Defaults to Groq's free tier (llama-3.3-70b-versatile). Any OpenAI-compatible
# chat-completions API works: uncomment and point these at your provider for
# longer conversations / higher limits, then set the matching key secret with:
#   wrangler secret put LLM_API_KEY
# (The legacy GROQ_MODEL var and GROQ_API_KEY secret keep working as fallbacks.)
#
LLM_ENDPOINT = "https://api.openai.com/v1/chat/completions"
LLM_MODEL = "gpt-4o-mini"
#
# Other examples:
#   OpenRouter: https://openrouter.ai/api/v1/chat/completions  (any listed model)
#   Together:   https://api.together.xyz/v1/chat/completions
#   Mistral:    https://api.mistral.ai/v1/chat/completions
GROQ_MODEL = "llama-3.3-70b-versatile"
