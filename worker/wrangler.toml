name = "signal-sifter-worker"
main = "src/index.js"
compatibility_date = "2024-11-01"

[vars]
# Set to your deployed site's origin (e.g. "https://username.github.io") once
# you know it. "*" is fine for local testing but allows any site to call your
# Worker in production.
ALLOWED_ORIGIN = "*"
GROQ_MODEL = "llama-3.3-70b-versatile"
RATE_LIMIT_PER_MINUTE = "10"

# GROQ_API_KEY is a secret, not a var — set it with:
#   wrangler secret put GROQ_API_KEY
