name: Bug report
description: Something broken? Tell us so we can fix it.
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
      placeholder: The AI reply rendered the raw §SRC header instead of badges...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Which part?
      options:
        - Static mode (menu / buckets)
        - AI mode (chat, badges)
        - Practice mode (?practice=1)
        - Worker / deployment
        - Docs / content schema
        - Other
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "e.g. Chrome 130 on Android, own fork with Groq free tier"
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the site in TR
        2. Enter AI mode, ask...
